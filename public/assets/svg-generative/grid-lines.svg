<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Horizontal lines -->
  <line id="h-01" x1="20" y1="50"  x2="380" y2="50"  stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="h-02" x1="20" y1="100" x2="380" y2="100" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="h-03" x1="20" y1="150" x2="380" y2="150" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="h-04" x1="20" y1="200" x2="380" y2="200" stroke="currentColor" stroke-width="1"    opacity="0.8"/>
  <line id="h-05" x1="20" y1="250" x2="380" y2="250" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="h-06" x1="20" y1="300" x2="380" y2="300" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="h-07" x1="20" y1="350" x2="380" y2="350" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <!-- Vertical lines -->
  <line id="v-01" x1="50"  y1="20" x2="50"  y2="380" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="v-02" x1="100" y1="20" x2="100" y2="380" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="v-03" x1="150" y1="20" x2="150" y2="380" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="v-04" x1="200" y1="20" x2="200" y2="380" stroke="currentColor" stroke-width="1"    opacity="0.8"/>
  <line id="v-05" x1="250" y1="20" x2="250" y2="380" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="v-06" x1="300" y1="20" x2="300" y2="380" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line id="v-07" x1="350" y1="20" x2="350" y2="380" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <!-- Intersection dots -->
  <circle id="dot-center" cx="200" cy="200" r="3" fill="currentColor" opacity="0.9"/>
  <circle id="dot-tl" cx="100" cy="100" r="2" fill="currentColor" opacity="0.5"/>
  <circle id="dot-tr" cx="300" cy="100" r="2" fill="currentColor" opacity="0.5"/>
  <circle id="dot-bl" cx="100" cy="300" r="2" fill="currentColor" opacity="0.5"/>
  <circle id="dot-br" cx="300" cy="300" r="2" fill="currentColor" opacity="0.5"/>
</svg>
